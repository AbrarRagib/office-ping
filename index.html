<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚨 Office Alert Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header { text-align: center; margin-bottom: 1.75rem; }
    .header h1 { font-size: 24px; font-weight: 600; color: #111; }
    .header p  { font-size: 14px; color: #888; margin-top: 4px; }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: #f8f8f6;
      border-radius: 10px; border: 1px solid #e8e8e4;
      margin-bottom: 1.5rem;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #bbb; flex-shrink: 0; transition: background 0.3s; }
    .dot.on  { background: #4caf50; animation: pulse 2s infinite; }
    .dot.err { background: #e53935; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-txt { font-size: 13px; color: #666; }
    #online { font-size: 13px; font-weight: 600; color: #333; margin-left: auto; }
    .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
    .mood-label { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    select {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1px solid #ddd; background: #fff;
      font-size: 15px; color: #333; cursor: pointer; outline: none;
    }
    select:focus { border-color: #e03030; }
    .big-btn {
      width: 100%; padding: 17px; border-radius: 12px; border: none;
      font-size: 18px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .big-btn:active   { transform: scale(0.97); }
    .big-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .alert-btn { background: #e03030; color: #fff; }
    .alert-btn:hover:not(:disabled) { background: #c42020; }
    .clear-btn { background: #f0f0ec; color: #444; font-size: 15px; padding: 13px; }
    .clear-btn:hover:not(:disabled) { background: #e4e4e0; }
    .log {
      background: #f8f8f6; border-radius: 10px;
      padding: 0.85rem; max-height: 160px; overflow-y: auto;
    }
    .log-item {
      font-size: 13px; color: #555; padding: 5px 0;
      border-bottom: 1px solid #eeeeea;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-empty { font-style: italic; color: #bbb; font-size: 13px; padding: 4px 0; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .mood-sunny  { background: #fff8d4; color: #8a6100; }
    .mood-cloudy { background: #e8eef5; color: #3a5070; }
    .mood-rainy  { background: #e4effe; color: #1a4aaa; }
    .mood-stormy { background: #fde8e8; color: #a32d2d; }
    .mood-foggy  { background: #f0f0ec; color: #555; }
    .log-time    { font-size: 11px; color: #bbb; flex-shrink: 0; }
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(180,0,0,0.94);
      flex-direction: column; align-items: center; justify-content: center;
      animation: flashIn 0.25s ease;
    }
    #overlay.active { display: flex; }
    @keyframes flashIn { from{opacity:0} to{opacity:1} }
    .ov-icon  { font-size: 80px; animation: shake 0.3s infinite; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
    .ov-title { font-size: 38px; font-weight: 700; color: #fff; margin-top: 14px; text-align: center; letter-spacing: 1px; }
    .ov-mood  { font-size: 20px; color: rgba(255,255,255,.85); margin-top: 10px; }
    .ov-btn {
      margin-top: 28px; padding: 13px 36px;
      background: rgba(255,255,255,.18); border: 2px solid rgba(255,255,255,.5);
      color: #fff; border-radius: 12px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .ov-btn:hover { background: rgba(255,255,255,.28); }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🚨 Office Alert Board</h1>
    <p>Hit the button — everyone gets notified instantly</p>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-txt">Loading...</span>
    <span id="online"></span>
  </div>

  <div class="controls">
    <div>
      <p class="mood-label">Current Weather</p>
      <select id="mood">
        <option value="sunny">☀️  Sunny — all good, chill out</option>
        <option value="cloudy">⛅  Cloudy — bit uncertain</option>
        <option value="rainy">🌧️  Rainy — not great, heads up</option>
        <option value="stormy">⛈️  Stormy — danger zone, stay alert</option>
        <option value="foggy">🌫️  Foggy — unclear, be careful</option>
      </select>
    </div>
    <button class="big-btn alert-btn" id="alert-btn" onclick="sendAlert()" disabled>🚨 Send Alert!</button>
    <button class="big-btn clear-btn" id="clear-btn" onclick="sendClear()" disabled>✅ All clear — stand down</button>
  </div>

  <div class="log" id="log">
    <div class="log-empty">No alerts yet...</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-icon">🚨</div>
  <div class="ov-title">ALERT!</div>
  <div class="ov-mood" id="ov-mood"></div>
  <button class="ov-btn" onclick="dismiss()">Got it!</button>
</div>

<script>
  const ABLY_KEY = 'FUodqA._KBn2g:uXWH8AicxAw58-cBEQN9FY6MBEiMqvHsvbfK5NwoepE';

  const CDNS = [
    'https://cdn.ably.com/lib/ably.min-1.js',
    'https://unpkg.com/ably@1/ably.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/ably/1.2.50/ably.min.js',
    'https://cdn.jsdelivr.net/npm/ably@1/ably.min.js'
  ];

  const moods = {
    sunny:  { label: '☀️ Sunny',  cls: 'mood-sunny'  },
    cloudy: { label: '⛅ Cloudy', cls: 'mood-cloudy' },
    rainy:  { label: '🌧️ Rainy',  cls: 'mood-rainy'  },
    stormy: { label: '⛈️ Stormy', cls: 'mood-stormy' },
    foggy:  { label: '🌫️ Foggy',  cls: 'mood-foggy'  },
  };

  let channel;

  function setStatus(txt, state) {
    document.getElementById('status-txt').textContent = txt;
    document.getElementById('dot').className = 'dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : '');
  }
  function setButtons(on) {
    document.getElementById('alert-btn').disabled = !on;
    document.getElementById('clear-btn').disabled = !on;
  }
  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[880,0,.15],[1100,.18,.15],[880,.36,.15],[1100,.54,.15],[880,.72,.15],[1100,.90,.4]].forEach(([f,t,d]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; o.type = 'sawtooth';
        g.gain.setValueAtTime(0.28, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + d);
        o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + d + 0.05);
      });
    } catch(e) {}
  }
  function addLog(msg, mood) {
    const log = document.getElementById('log');
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();
    const now  = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const m    = mood ? moods[mood] : null;
    const el   = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = `<span>${msg}</span><span style="display:flex;gap:6px;align-items:center">${m ? `<span class="badge ${m.cls}">${m.label}</span>` : ''}<span class="log-time">${time}</span></span>`;
    log.prepend(el);
  }
  function showOverlay(mood) {
    beep();
    const m = moods[mood] || moods.sunny;
    document.getElementById('ov-mood').textContent = m.label;
    document.getElementById('overlay').classList.add('active');
    setTimeout(dismiss, 9000);
  }
  function dismiss() { document.getElementById('overlay').classList.remove('active'); }
  function updateOnline() {
    channel.presence.get((err, members) => {
      if (!err) document.getElementById('online').textContent = (members ? members.length : 1) + ' online';
    });
  }
  function sendAlert() {
    if (!channel) return;
    const mood = document.getElementById('mood').value;
    channel.publish('alert', { type: 'alert', mood });
    showOverlay(mood);
    addLog('You sent an alert!', mood);
  }
  function sendClear() {
    if (!channel) return;
    channel.publish('alert', { type: 'clear' });
    addLog('You sent: All clear', null);
  }

  function initAbly() {
    setStatus('Connecting...', '');
    const ably = new Ably.Realtime({ key: ABLY_KEY, closeOnUnload: true });
    channel    = ably.channels.get('office-alert');

    ably.connection.on('connected', () => {
      setStatus('Connected', 'on');
      setButtons(true);
      channel.presence.enter({});
      channel.presence.subscribe(updateOnline);
      updateOnline();
      channel.subscribe('alert', msg => {
        const d = msg.data;
        if (d.type === 'alert') { showOverlay(d.mood); addLog('Alert received!', d.mood); }
        else { addLog('All clear — stand down', null); }
      });
    });
    ably.connection.on('failed',       () => { setStatus('Connection failed', 'err'); setButtons(false); });
    ably.connection.on('disconnected', () => { setStatus('Disconnected', 'err'); setButtons(false); document.getElementById('online').textContent = ''; });
  }

  // Try each CDN one by one until one works
  function loadAbly(cdns) {
    if (cdns.length === 0) {
      setStatus('Failed to load — check internet', 'err');
      return;
    }
    const url  = cdns[0];
    const rest = cdns.slice(1);
    setStatus('Loading... (' + url.split('/')[2] + ')', '');
    const s    = document.createElement('script');
    s.src      = url;
    s.onload   = () => { if (window.Ably) initAbly(); else loadAbly(rest); };
    s.onerror  = () => loadAbly(rest);
    document.head.appendChild(s);
  }

  window.addEventListener('load', () => loadAbly(CDNS));
</script>
</body>
</html>
